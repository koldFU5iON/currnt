name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Skip pure-docs PRs — review cost (~$0.20-1.69 per PR depending on model)
    # is not worth it for markdown/docs-only changes. Use `@claude` in a comment
    # to invoke a review manually if a docs change actually warrants one.
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".github/**"
      - "LICENSE"

jobs:
  claude-review:
    # Optional: Filter by PR author
    # if: |
    #   github.event.pull_request.user.login == 'external-contributor' ||
    #   github.event.pull_request.user.login == 'new-developer' ||
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'

    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          # Use Sonnet for routine reviews — ~5-8x cheaper than Opus and
          # adequate for most diffs. Use `@claude` mentions (claude.yml) for
          # the cases where you want Opus-grade depth on demand.
          claude_args: '--model claude-sonnet-4-6'
          # Prompt notes for the reviewer:
          # - Project conventions live in AGENTS.md (Claude reads it via the
          #   `@AGENTS.md` import in CLAUDE.md). Apply those conventions when
          #   reviewing — JSON storage patterns, requireProfile gating on
          #   user-owned data, API-key encryption (src/lib/encryption.ts),
          #   business logic in src/modules/ (API routes stay thin).
          prompt: |
            /code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}

            Repo-specific risks worth weighing during the review:
            - API keys are AES-GCM encrypted via src/lib/encryption.ts. Never log/return raw keys; routes should return `hasApiKey: Boolean(...)`.
            - Any DB read/write touching user-owned data must filter by `profile.id` from `requireProfile()` in src/lib/session.ts.
            - Business logic stays in src/modules/<domain>/. API routes and Server Actions should be thin.
            - New JSON columns: prefer native `Json?` with Zod validation (see src/modules/onboarding/schema.ts). `parseJsonField` is legacy for existing profile columns only.
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options

