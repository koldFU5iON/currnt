services:
  db:
    image: postgres:16-alpine
    container_name: taiilrd-db
    restart: unless-stopped
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: taiilrd
      POSTGRES_PASSWORD: taiilrd
      POSTGRES_DB: taiilrd
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
